spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://your-auth-provider.com  # e.g., Keycloak, Auth0, Google
  datasource:
    url: jdbc:postgresql://localhost:5432/disease_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

resilience4j:
  circuitbreaker:
    instances:
      diseaseService:
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 10s